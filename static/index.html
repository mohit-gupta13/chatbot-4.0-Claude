<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="chat-container open">
        <div class="chat-header">
            <span>Travel Assistant</span>
            <span style="cursor: pointer; font-size: 20px;" onclick="toggleChat()">×</span>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <strong>Welcome! 👋</strong><br><br>
                I can help you search through all flight and hotel bookings.<br><br>
                <strong>Try searching by:</strong>
                <ul style="margin: 5px 0; padding-left: 20px;">
                    <li>"Show all flight bookings"</li>
                    <li>"Bookings for destination city Dubai"</li>
                    <li>"Show bookings with cancellation deadline"</li>
                </ul>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Query bookings, passengers, status..."
                onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <button class="chat-toggle-btn" onclick="toggleChat()">💬</button>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (message === "") return;

            removeFeedbackButtons();
            lastUserMessage = message;
            addMessage(message, 'user');
            inputField.value = '';

            // Show loading
            const loadingDiv = addMessage('Searching...', 'bot loading');
            loadingDiv.id = 'loading-message';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                const loading = document.getElementById('loading-message');
                if (loading) loading.remove();

                if (data.response_type === 'error') {
                    addMessage(`⚠️ ${data.response}`, 'bot error');
                } else {
                    // Show text summary
                    addMessage(data.response, 'bot');

                    // Display table if data exists
                    if (data.data && data.data.length > 0) {
                        displayDataTable(data.data);
                    }

                    // Show feedback buttons for successful data/text responses
                    addFeedbackButtons();
                }

            } catch (error) {
                console.error('Error:', error);
                const loading = document.getElementById('loading-message');
                if (loading) loading.remove();
                addMessage("Something went wrong. Please check if the server is running.", 'bot error');
            }
        }

        function displayDataTable(data) {
            const chatMessages = document.getElementById('chat-messages');
            const tableContainer = document.createElement('div');
            tableContainer.className = 'data-table-container';

            const table = document.createElement('table');
            table.className = 'data-table';

            // Priority columns for back-office
            const headers = ['Reference No', 'Lead Pax Name', 'Client Name', 'City', 'Trip Start Date', 'Status_Label', 'Net Amount', 'Selling Amount'];

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header.replace('_Label', '');
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            data.forEach(item => {
                const row = document.createElement('tr');
                headers.forEach(header => {
                    const td = document.createElement('td');
                    td.textContent = item[header] ?? '-';
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            });
            table.appendChild(tbody);
            tableContainer.appendChild(table);

            chatMessages.appendChild(tableContainer);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(text, sender) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function toggleChat() {
            const chatContainer = document.querySelector('.chat-container');
            chatContainer.classList.toggle('open');
        }

        let lastUserMessage = "";

        function addFeedbackButtons() {
            const chatMessages = document.getElementById('chat-messages');
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback-container';
            feedbackDiv.id = 'current-feedback';

            feedbackDiv.innerHTML = `
                <div style="font-size: 0.9em; color: #666; width: 100%; margin-bottom: 5px;">Was this helpful?</div>
                <button class="feedback-btn yes" onclick="handleFeedback(true)">👍 Yes</button>
                <button class="feedback-btn no" onclick="handleFeedback(false)">👎 No</button>
            `;

            chatMessages.appendChild(feedbackDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeFeedbackButtons() {
            const currentFeedback = document.getElementById('current-feedback');
            if (currentFeedback) {
                currentFeedback.remove();
            }
        }

        async function handleFeedback(isHelpful) {
            removeFeedbackButtons();

            try {
                await fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: lastUserMessage,
                        helpful: isHelpful
                    })
                });
            } catch (error) {
                console.error('Error sending feedback:', error);
            }

            if (isHelpful) {
                addMessage("Glad I could help! 😊", 'bot');
            } else {
                addMessage("I'm sorry I couldn't be more helpful. I'll pass your feedback to our team.", 'bot');
            }
        }
    </script>
</body>

</html>
